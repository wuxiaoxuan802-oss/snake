<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹貪吃蛇 - 現代化 HTML5 遊戲</title>
    <!-- 引入外部樣式表 -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">
        <h1>NEON SNAKE</h1>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">SCORE</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">HIGH SCORE</span>
                <span id="highScore" class="stat-value">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls-hint">
            使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>WASD</kbd> 來移動
        </div>
    </div>

    <!-- D-Pad 方向按鈕 (所有裝置皆可見，固定定位於左下角) -->
    <div id="dpad-container">
        <button id="btn-up" class="dpad-btn">↑</button>
        <div class="dpad-middle-row">
            <button id="btn-left" class="dpad-btn">←</button>
            <button id="btn-right" class="dpad-btn">→</button>
        </div>
        <button id="btn-down" class="dpad-btn">↓</button>
    </div>

    <!-- 遊戲結束畫面 -->
    <div id="gameOverOverlay" class="overlay">
        <h2>GAME OVER</h2>
        <p style="margin-bottom: 0.5rem; font-size: 1.2rem;">最終得分：<span id="finalScore">0</span></p>
        <p id="jokeDisplay"
            style="margin-bottom: 2rem; color: #a0a0ab; font-style: italic; max-width: 80%; line-height: 1.5;"></p>
        <button class="btn-restart" onclick="resetGame()">再次挑戰</button>
    </div>

    <!-- 引入外部遊戲邏輯 -->
    <script src="game.js"></script>
</body>

</html>
